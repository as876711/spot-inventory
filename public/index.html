<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WowMa 現貨挖寶區 | LINE 詢問保留</title>
  <meta name="description" content="WowMa 現貨挖寶區，各種 IP 周邊、限定商品不定期更新，不用等待預購，喜歡直接帶回家。">
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#top" aria-label="回到首頁">
      <img class="brand-logo" src="./images/logo.svg" alt="" onerror="this.hidden=true; this.nextElementSibling.hidden=false">
      <span class="brand-mark" hidden>庫</span>
      <span>WowMa 現貨挖寶區</span>
    </a>
    <nav class="site-nav" aria-label="主要導覽">
      <a href="#items">商品</a>
      <a href="#trade">購買須知</a>
      <a href="./admin.html">登入</a>
    </nav>
  </header>

  <main id="top">
    <section class="hero">
      <div class="hero-content">
        <h1><span class="title-line">WowMa</span><span class="title-line">現貨挖寶區</span></h1>
        <p class="hero-copy">✨各種 IP 周邊、限定商品不定期更新 ✨<br>不用等待預購，喜歡直接帶回家♥<br>若點選按鈕無法加入好友，<br>請搜尋 LINE ID：@334lnlsn</p>
        <div class="hero-actions">
          <a class="button primary" href="#items">查看現貨</a>
          <a class="button ghost" id="heroLineLink" href="#" target="_blank" rel="noreferrer">Line 詢問</a>
        </div>
      </div>
    </section>

    <section class="inventory-bar" aria-label="庫存摘要">
      <div><strong id="countAvailable">0</strong><span>現貨</span></div>
      <div><strong id="countReserved">0</strong><span>保留</span></div>
      <div><strong id="countSold">0</strong><span>完售</span></div>
    </section>

    <section id="items" class="section">
      <div class="section-heading">
        <div>
          <h2>商品列表</h2>
        </div>
        <div class="toolbar">
          <label class="search">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="搜尋商品、分類">
          </label>
          <select id="sortSelect" aria-label="排序">
            <option value="featured">精選排序</option>
            <option value="priceAsc">價格低到高</option>
            <option value="priceDesc">價格高到低</option>
            <option value="newest">最新上架</option>
          </select>
        </div>
      </div>

      <div class="filters" aria-label="商品分類">
        <button class="filter active" data-filter="all" type="button">全部</button>
        <button class="filter" data-filter="三麗鷗" type="button">三麗鷗</button>
        <button class="filter" data-filter="吉伊卡哇" type="button">吉伊卡哇</button>
        <button class="filter" data-filter="拉拉熊" type="button">拉拉熊</button>
        <button class="filter" data-filter="蒙奇奇" type="button">蒙奇奇</button>
        <button class="filter" data-filter="寶可夢" type="button">寶可夢</button>
        <button class="filter" data-filter="史奴比" type="button">史奴比</button>
        <button class="filter" data-filter="其他" type="button">其他</button>
      </div>

      <div id="productGrid" class="product-grid" aria-live="polite"></div>
      <p id="emptyState" class="empty-state" hidden>目前沒有符合條件的商品。</p>
    </section>

    <section id="trade" class="trade-section">
      <div class="trade-copy">
        <h2>購買須知</h2>
        <p>欲選購之商品請透過官方 LINE 詢問，確認仍有庫存後，將協助保留。</p>
        <p>商品保留期限、付款方式及出貨安排，皆以 客服 LINE 回覆內容為準。</p>
      </div>
      <a class="button primary" id="tradeLineLink" href="#" target="_blank" rel="noreferrer">Line 詢問</a>
    </section>

  </main>

  <footer class="site-footer">
    <span class="footer-brand">
      <img class="footer-logo" src="./images/logo.svg" alt="" onerror="this.hidden=true">
      <span>WowMa 現貨挖寶區</span>
    </span>
    <div class="footer-links">
      <a id="footerLineLink" href="#" target="_blank" rel="noreferrer">LINE 聯絡</a>
      <a href="./admin.html">登入</a>
    </div>
  </footer>

  <script src="./app.js"></script>
</body>
</html>

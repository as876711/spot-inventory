<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>現貨庫存 | 閒置物品選物</title>
  <meta name="description" content="精選閒置物品現貨庫存，查看品況、價格與交易資訊，直接用 LINE 詢問。">
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#top" aria-label="回到首頁">
      <span class="brand-mark">庫</span>
      <span>現貨庫存</span>
    </a>
    <nav class="site-nav" aria-label="主要導覽">
      <a href="#items">商品</a>
      <a href="#trade">交易</a>
      <a href="#admin">後台</a>
    </nav>
  </header>

  <main id="top">
    <section class="hero">
      <div class="hero-content">
        <p class="eyebrow">Secondhand Market</p>
        <h1>現貨庫存</h1>
        <p class="hero-copy">整理生活裡用不到、但仍值得被好好使用的物品。每件都標示品況、價格與狀態，看中後直接用 LINE 詢問。</p>
        <div class="hero-actions">
          <a class="button primary" href="#items">查看商品</a>
          <a class="button ghost" id="heroLineLink" href="#" target="_blank" rel="noreferrer">LINE 詢問</a>
        </div>
      </div>
    </section>

    <section class="inventory-bar" aria-label="庫存摘要">
      <div><strong id="countAvailable">0</strong><span>可售</span></div>
      <div><strong id="countReserved">0</strong><span>保留</span></div>
      <div><strong id="countSold">0</strong><span>售出</span></div>
    </section>

    <section id="items" class="section">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Available Now</p>
          <h2>商品列表</h2>
        </div>
        <div class="toolbar">
          <label class="search">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="搜尋商品、分類、品況">
          </label>
          <select id="sortSelect" aria-label="排序">
            <option value="featured">精選排序</option>
            <option value="priceAsc">價格低到高</option>
            <option value="priceDesc">價格高到低</option>
            <option value="newest">最新上架</option>
          </select>
        </div>
      </div>

      <div class="filters" aria-label="商品分類">
        <button class="filter active" data-filter="all" type="button">全部</button>
        <button class="filter" data-filter="家具" type="button">家具</button>
        <button class="filter" data-filter="家電" type="button">家電</button>
        <button class="filter" data-filter="生活" type="button">生活</button>
        <button class="filter" data-filter="數位" type="button">數位</button>
      </div>

      <div id="productGrid" class="product-grid" aria-live="polite"></div>
      <p id="emptyState" class="empty-state" hidden>目前沒有符合條件的商品。</p>
    </section>

    <section id="trade" class="trade-section">
      <div class="trade-copy">
        <p class="eyebrow">Trade Notes</p>
        <h2>交易說明</h2>
        <p>所有商品皆為現貨閒置品，品況以照片與文字描述為準。看中商品後請用 LINE 傳送商品名稱，後續確認細節、保留與交付方式。</p>
      </div>
      <a class="button primary" id="tradeLineLink" href="#" target="_blank" rel="noreferrer">加 LINE 詢問</a>
    </section>

    <section id="admin" class="section admin-section">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Inventory Admin</p>
          <h2>庫存後台</h2>
        </div>
        <button class="button ghost" id="logoutButton" type="button" hidden>登出</button>
      </div>

      <form id="loginForm" class="login-panel">
        <label>
          帳號
          <input id="usernameInput" autocomplete="username" required value="admin">
        </label>
        <label>
          密碼
          <input id="passwordInput" type="password" autocomplete="current-password" required placeholder="請輸入後台密碼">
        </label>
        <button class="button primary" type="submit">登入後台</button>
        <p id="loginMessage" class="form-message"></p>
      </form>

      <div id="adminPanel" class="admin-layout" hidden>
        <form id="itemForm" class="admin-form">
          <input type="hidden" id="itemId">
          <label>
            商品名稱
            <input id="nameInput" required maxlength="60" placeholder="例如：實木邊桌">
          </label>
          <div class="form-row">
            <label>
              分類
              <select id="categoryInput">
                <option>家具</option>
                <option>家電</option>
                <option>生活</option>
                <option>數位</option>
              </select>
            </label>
            <label>
              狀態
              <select id="statusInput">
                <option value="available">可售</option>
                <option value="reserved">保留</option>
                <option value="sold">售出</option>
              </select>
            </label>
          </div>
          <div class="form-row">
            <label>
              價格
              <input id="priceInput" required type="number" min="0" step="100" placeholder="1200">
            </label>
            <label>
              圖片上傳
              <input id="uploadInput" type="file" accept="image/*">
            </label>
          </div>
          <label>
            圖片網址
            <input id="imageInput" required placeholder="/uploads/example.jpg 或 https://...">
          </label>
          <label>
            品況描述
            <textarea id="conditionInput" required rows="3" maxlength="180" placeholder="九成新，邊角有正常使用痕跡。"></textarea>
          </label>
          <p id="formMessage" class="form-message"></p>
          <div class="form-actions">
            <button class="button primary" type="submit">儲存商品</button>
            <button class="button ghost" id="cancelEditButton" type="button">取消編輯</button>
          </div>
        </form>

        <div class="admin-list" id="adminList" aria-label="後台商品清單"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <span>現貨庫存</span>
    <a id="footerLineLink" href="#" target="_blank" rel="noreferrer">LINE 聯絡</a>
  </footer>

  <script src="./app.js"></script>
</body>
</html>

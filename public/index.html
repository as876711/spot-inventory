<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>現貨庫存 | 閒置物品選物</title>
  <meta name="description" content="精選閒置物品現貨庫存，查看品況、價格與交易資訊，直接用 LINE 詢問。">
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#top" aria-label="回到首頁">
      <span class="brand-mark">庫</span>
      <span>現貨庫存</span>
    </a>
    <nav class="site-nav" aria-label="主要導覽">
      <a href="#items">商品</a>
      <a href="#trade">交易</a>
      <a href="./admin.html">後台管理</a>
    </nav>
  </header>

  <main id="top">
    <section class="hero">
      <div class="hero-content">
        <h1>現貨庫存</h1>
        <p class="hero-copy">整理生活裡用不到、但仍值得被好好使用的物品。每件都標示品況、價格與狀態，看中後直接用 LINE 詢問。</p>
        <div class="hero-actions">
          <a class="button primary" href="#items">查看商品</a>
          <a class="button ghost" id="heroLineLink" href="#" target="_blank" rel="noreferrer">LINE 詢問</a>
        </div>
      </div>
    </section>

    <section class="inventory-bar" aria-label="庫存摘要">
      <div><strong id="countAvailable">0</strong><span>可售</span></div>
      <div><strong id="countReserved">0</strong><span>保留</span></div>
      <div><strong id="countSold">0</strong><span>售出</span></div>
    </section>

    <section id="items" class="section">
      <div class="section-heading">
        <div>
          <h2>商品列表</h2>
        </div>
        <div class="toolbar">
          <label class="search">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="搜尋商品、分類、品況">
          </label>
          <select id="sortSelect" aria-label="排序">
            <option value="featured">精選排序</option>
            <option value="priceAsc">價格低到高</option>
            <option value="priceDesc">價格高到低</option>
            <option value="newest">最新上架</option>
          </select>
        </div>
      </div>

      <div class="filters" aria-label="商品分類">
        <button class="filter active" data-filter="all" type="button">全部</button>
        <button class="filter" data-filter="三麗鷗" type="button">三麗鷗</button>
        <button class="filter" data-filter="吉伊卡哇" type="button">吉伊卡哇</button>
        <button class="filter" data-filter="寶可夢" type="button">寶可夢</button>
        <button class="filter" data-filter="其他" type="button">其他</button>
      </div>

      <div id="productGrid" class="product-grid" aria-live="polite"></div>
      <p id="emptyState" class="empty-state" hidden>目前沒有符合條件的商品。</p>
    </section>

    <section id="trade" class="trade-section">
      <div class="trade-copy">
        <p class="eyebrow">Trade Notes</p>
        <h2>交易說明</h2>
        <p>所有商品皆為現貨閒置品，品況以照片與文字描述為準。看中商品後請用 LINE 傳送商品名稱，後續確認細節、保留與交付方式。</p>
      </div>
      <a class="button primary" id="tradeLineLink" href="#" target="_blank" rel="noreferrer">加 LINE 詢問</a>
    </section>

  </main>

  <footer class="site-footer">
    <span>現貨庫存</span>
    <div class="footer-links">
      <a id="footerLineLink" href="#" target="_blank" rel="noreferrer">LINE 聯絡</a>
      <a href="./admin.html">後台管理</a>
    </div>
  </footer>

  <script src="./app.js"></script>
</body>
</html>

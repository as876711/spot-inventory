services:
  - type: web
    name: spot-inventory
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_ROOT
        value: /var/data
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: inventory-data
      mountPath: /var/data
      sizeGB: 1
